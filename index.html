<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kieu's Salon | Premium Hair &amp; Beauty in Randolph, MA</title>
    <meta name="description" content="Where Beauty Meets Craft. Premium full-service hair and beauty salon in Randolph, MA offering cuts, coloring, extensions, spa treatments, and bridal services." />
    <!-- Google Fonts: Playfair Display (serif headings) + Inter (sans body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Playfair+Display:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <!-- Prevent theme flash: apply .dark class from localStorage before React hydrates -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('theme');
          if (t === 'dark') {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
